const brs=[...new Set(DATA.map(d=>d.br))].sort();
const sel=document.getElementById('fbr');
brs.forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;sel.appendChild(o);});
const state={q:'',br:'',plan:'',sp:'',cust:'',sex:'',ageb:'',ok:true,ex:false,insp:false,neuter:false,vac:false};
const money=n=>'$'+n.toLocaleString();
function match(d){
  if(state.br&&d.br!==state.br)return false;
  if(state.plan&&d.plan!==state.plan)return false;
  if(state.sp&&d.sp!==state.sp)return false;
  if(state.cust&&d.cust!==state.cust)return false;
  if(state.sex&&d.sex!==state.sex)return false;
  if(state.ageb&&d.ageb!==state.ageb)return false;
  const stok=(state.ok&&d.st==='有效')||(state.ex&&d.st==='已排除');
  if(!stok)return false;
  if(state.insp&&!d.insp)return false;
  if(state.neuter&&!d.neuter)return false;
  if(state.vac&&!d.vac)return false;
  if(state.q){const q=state.q.toLowerCase();
    if(!(d.pet.toLowerCase().includes(q)||d.id.includes(q)||d.dr.toLowerCase().includes(q)||d.br.includes(q)||d.breed.toLowerCase().includes(q)))return false;}
  return true;
}
function render(){
  const rows=DATA.filter(match);
  const list=document.getElementById('list');
  const validN=rows.filter(r=>r.st==='有效').length;
  const sumTot=rows.reduce((s,r)=>s+r.tot,0);
  document.getElementById('sum').innerHTML=
    `符合 <b>${rows.length}</b> 筆（有效 ${validN}／排除 ${rows.length-validN}）｜合計病歷金額 <b>${money(sumTot)}</b>`;
  if(!rows.length){list.innerHTML='<div class="none">查無符合條件的個案</div>';return;}
  list.innerHTML=rows.map((d,idx)=>{
    const tags=[`<span class="t ${d.plan}">${d.plan}方案</span>`,
      d.st==='已排除'?'<span class="t ex">已排除</span>':'<span class="t ok">有效</span>'];
    if(d.insp)tags.push('<span class="t i">檢查</span>');
    if(d.neuter)tags.push('<span class="t s">結紮</span>');
    if(d.vac)tags.push('<span class="t v">疫苗</span>');
    const lines=d.lines.map(l=>`<tr><td>${l.i}</td><td><span class="catt">${l.c}</span></td><td class="num">${l.a?money(l.a):'—'}</td></tr>`).join('');
    const rs=d.st==='已排除'?`<div class="rs">排除原因：${d.rs}（非健檢情境，不計入達標與獎金）</div>`:'';
    return `<div class="card" data-i="${idx}">
      <div class="head" onclick="this.parentNode.classList.toggle('open')">
        <span class="pet">${d.pet}</span>
        <span class="meta">${d.br}｜${d.dt}｜${d.dr}｜${d.sp}${d.breed&&d.breed!=='未填'?'·'+d.breed:''}｜${d.sex}｜${d.age!=null?d.age+'歲':'齡未填'}｜${d.cust}｜病歷號 ${d.id}</span>
        <span class="tags">${tags.join('')}</span>
        <span class="tot">${money(d.tot)}</span>
        <span class="arrow">▸</span>
      </div>
      <div class="detail">${rs}
        <table><thead><tr><th>收費項目</th><th>類別</th><th>金額</th></tr></thead>
        <tbody>${lines}</tbody></table>
      </div></div>`;
  }).join('');
}
document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value.trim();render();});
document.getElementById('fbr').addEventListener('change',e=>{state.br=e.target.value;render();});
document.getElementById('fplan').addEventListener('change',e=>{state.plan=e.target.value;render();});
document.getElementById('fsp').addEventListener('change',e=>{state.sp=e.target.value;render();});
document.getElementById('fcust').addEventListener('change',e=>{state.cust=e.target.value;render();});
document.getElementById('fsex').addEventListener('change',e=>{state.sex=e.target.value;render();});
document.getElementById('fage').addEventListener('change',e=>{state.ageb=e.target.value;render();});
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  const k=c.dataset.k;state[k]=!state[k];c.classList.toggle('on');
  if(k==='ex')c.classList.toggle('red',state.ex);
  if(k==='insp'||k==='vac')c.classList.toggle('gold',state[k]);
  render();
}));
render();
